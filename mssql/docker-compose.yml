services:
  mssql:
    container_name: mssql-db
    image: mcr.microsoft.com/mssql/server:2019-latest
    restart: always
    env_file:
      - .env
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD}
      - MSSQL_PID=Express
    volumes:
      - ${MSSQL_VOLUME_DATA}:/var/opt/mssql
    ports:
      - 1433:1433